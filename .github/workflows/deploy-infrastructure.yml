name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'iac/**'
      - 'apps/api/terminal.Dockerfile'
      - 'apps/api/docker-compose.terminal.yml'
  workflow_dispatch:
    inputs:
      ssh_public_key:
        description: 'SSH public key for EC2 access (or use EC2_SSH_PUBLIC_KEY secret)'
        required: false
        type: string
      force_tls_rotation:
        description: 'Rotate Docker TLS certificates even when they are still current'
        required: false
        type: boolean
        default: false

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pulumi
        uses: pulumi/actions@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: iac
        run: bun install

      - name: Validate required secrets
        run: |
          MISSING_SECRETS=()

          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            MISSING_SECRETS+=("AWS_ACCESS_KEY_ID")
          fi

          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            MISSING_SECRETS+=("AWS_SECRET_ACCESS_KEY")
          fi

          if [ -z "${{ secrets.PULUMI_PASSPHRASE }}" ]; then
            MISSING_SECRETS+=("PULUMI_PASSPHRASE")
          fi

          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            MISSING_SECRETS+=("RAILWAY_TOKEN")
          fi

          if [ -z "${{ secrets.CORS_ORIGINS }}" ]; then
            MISSING_SECRETS+=("CORS_ORIGINS")
          fi

          if [ -z "${{ secrets.ADMIN_API_KEY }}" ]; then
            MISSING_SECRETS+=("ADMIN_API_KEY")
          fi

          if [ -z "${{ secrets.SSH_INGRESS_CIDR }}" ]; then
            MISSING_SECRETS+=("SSH_INGRESS_CIDR")
          fi

          if [ -z "${{ secrets.DOCKER_INGRESS_CIDR }}" ]; then
            MISSING_SECRETS+=("DOCKER_INGRESS_CIDR")
          fi

          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            MISSING_SECRETS+=("EC2_SSH_KEY")
          fi

          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "::error::Missing required GitHub secrets: ${MISSING_SECRETS[*]}"
            echo "Please configure these secrets in your repository settings:"
            for secret in "${MISSING_SECRETS[@]}"; do
              echo "  - $secret"
            done
            exit 1
          fi

          echo "✅ All required secrets are configured"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Set Pulumi passphrase
        run: |
          echo "PULUMI_CONFIG_PASSPHRASE=${{ secrets.PULUMI_PASSPHRASE }}" >> $GITHUB_ENV
          echo "AWS_REGION=us-west-2" >> $GITHUB_ENV

      - name: Create S3 bucket for Pulumi state (if needed)
        run: |
          BUCKET_NAME="mike-os-x-pulumi-state"
          if ! aws s3 ls "s3://$BUCKET_NAME" 2>&1 > /dev/null; then
            echo "Creating S3 bucket for Pulumi state..."
            aws s3 mb "s3://$BUCKET_NAME" --region us-west-2
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
            echo "✅ S3 bucket created with versioning enabled"
          else
            echo "✅ S3 bucket already exists"
          fi

      - name: Login to Pulumi (S3 backend)
        run: pulumi login s3://mike-os-x-pulumi-state

      - name: Select or create stack
        working-directory: iac
        run: |
          if ! pulumi stack ls 2>/dev/null | grep -q "default"; then
            pulumi stack init default
          else
            pulumi stack select default
          fi

      - name: Set SSH public key
        working-directory: iac
        run: |
          SSH_KEY="${{ github.event.inputs.ssh_public_key || secrets.EC2_SSH_PUBLIC_KEY }}"
          if [ -z "$SSH_KEY" ]; then
            echo "::error::SSH public key is required but not provided."
            echo "Please either:"
            echo "  1. Set the EC2_SSH_PUBLIC_KEY secret in repository settings, or"
            echo "  2. Provide it as a workflow input when manually triggering the workflow"
            exit 1
          fi
          pulumi config set sshPublicKey "$SSH_KEY"

      - name: Configure restricted ingress
        working-directory: iac
        env:
          SSH_INGRESS_CIDR: ${{ secrets.SSH_INGRESS_CIDR }}
          DOCKER_INGRESS_CIDR: ${{ secrets.DOCKER_INGRESS_CIDR }}
        run: |
          python3 - <<'PY'
          import ipaddress
          import os

          for name in ("SSH_INGRESS_CIDR", "DOCKER_INGRESS_CIDR"):
              value = os.environ[name]
              network = ipaddress.ip_network(value, strict=False)
              if network.version != 4 or network.prefixlen == 0:
                  raise SystemExit(f"{name} must be a restricted IPv4 CIDR")
          PY

          pulumi config set sshIngressCidr "$SSH_INGRESS_CIDR"
          pulumi config set dockerIngressCidr "$DOCKER_INGRESS_CIDR"

      - name: Handle existing key pair
        working-directory: iac
        run: |
          # Check if key pair exists in Pulumi state
          if pulumi stack export 2>/dev/null | jq -e '.deployment.resources[] | select(.type == "aws:ec2/keyPair:KeyPair" and .id == "mike-os-x-terminal-key")' > /dev/null 2>&1; then
            echo "✅ Key pair already in Pulumi state"
          else
            # Key pair not in state, check if it exists in AWS
            if aws ec2 describe-key-pairs --key-names mike-os-x-terminal-key --region us-west-2 > /dev/null 2>&1; then
              echo "⚠️  Key pair exists in AWS but not in Pulumi state"
              echo "Deleting orphaned key pair to allow Pulumi to manage it..."
              aws ec2 delete-key-pair --key-name mike-os-x-terminal-key --region us-west-2
              echo "✅ Orphaned key pair deleted, Pulumi will create a new one"
            else
              echo "✅ Key pair doesn't exist in AWS, Pulumi will create it"
            fi
          fi

      - name: Refresh Pulumi state
        working-directory: iac
        run: pulumi refresh --yes --non-interactive

      - name: Preview changes
        working-directory: iac
        run: pulumi preview --non-interactive

      - name: Deploy infrastructure
        working-directory: iac
        run: pulumi up --yes --non-interactive

      - name: Get EC2 IP
        id: get_ip
        working-directory: iac
        run: |
          EC2_IP=$(pulumi stack output publicIp --show-secrets)
          echo "EC2_IP=$EC2_IP" >> $GITHUB_OUTPUT
          echo "EC2 IP: $EC2_IP"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ steps.get_ip.outputs.EC2_IP }} >> ~/.ssh/known_hosts

      - name: Wait for EC2 to be ready
        run: |
          echo "Waiting for EC2 instance to be ready..."
          EC2_IP="${{ steps.get_ip.outputs.EC2_IP }}"
          max_attempts=30
          attempt=0

          while [ $attempt -lt $max_attempts ]; do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/id_rsa ubuntu@$EC2_IP echo "Connected" 2>/dev/null; then
              echo "✅ EC2 instance is ready"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts: Waiting for SSH..."
            sleep 10
          done

          echo "::error::EC2 instance did not become reachable over SSH"
          exit 1

      - name: Determine whether TLS rotation is required
        id: tls_rotation
        env:
          EC2_IP: ${{ steps.get_ip.outputs.EC2_IP }}
          FORCE_TLS_ROTATION: ${{ inputs.force_tls_rotation || 'false' }}
        run: |
          set -euo pipefail
          ROTATE=false
          REASON=current

          if [ "$FORCE_TLS_ROTATION" = "true" ]; then
            ROTATE=true
            REASON=forced
          elif ! ssh -i ~/.ssh/id_rsa ubuntu@"$EC2_IP" \
            "sudo test -f /etc/docker/certs/server-cert.pem &&
             sudo openssl x509 -checkend 2592000 -noout -in /etc/docker/certs/server-cert.pem &&
             sudo openssl x509 -noout -ext subjectAltName -in /etc/docker/certs/server-cert.pem | grep -q 'IP Address:$EC2_IP'"; then
            ROTATE=true
            REASON=missing_expiring_or_wrong_host
          fi

          echo "rotate=$ROTATE" >> "$GITHUB_OUTPUT"
          echo "TLS rotation required: $ROTATE ($REASON)"

      - name: Generate TLS certificates
        if: steps.tls_rotation.outputs.rotate == 'true'
        run: ./scripts/generate-docker-tls.sh "${{ steps.get_ip.outputs.EC2_IP }}" "$(pwd)/certs" 365

      - name: Upload server certificates to EC2
        if: steps.tls_rotation.outputs.rotate == 'true'
        run: |
          EC2_IP="${{ steps.get_ip.outputs.EC2_IP }}"
          mkdir -p /tmp/certs
          cp certs/daemon/* /tmp/certs/
          cp certs/ca.pem /tmp/certs/

          scp -i ~/.ssh/id_rsa -r /tmp/certs/* ubuntu@$EC2_IP:/tmp/certs/
          echo "✅ Server certificates uploaded to EC2"

      - name: Configure Docker TLS on EC2
        if: steps.tls_rotation.outputs.rotate == 'true'
        run: |
          EC2_IP="${{ steps.get_ip.outputs.EC2_IP }}"

          # Create the daemon.json content
          DAEMON_JSON='{
            "hosts": ["unix:///var/run/docker.sock", "tcp://0.0.0.0:2376"],
            "tls": true,
            "tlsverify": true,
            "tlscacert": "/etc/docker/certs/ca.pem",
            "tlscert": "/etc/docker/certs/server-cert.pem",
            "tlskey": "/etc/docker/certs/server-key.pem"
          }'

          ssh -i ~/.ssh/id_rsa ubuntu@$EC2_IP "
            set -e
            echo 'Configuring Docker TLS...'
            
            # Copy certificates to Docker certs directory
            sudo mkdir -p /etc/docker/certs
            sudo cp /tmp/certs/* /etc/docker/certs/
            sudo chmod 600 /etc/docker/certs/server-key.pem
            sudo chmod 644 /etc/docker/certs/ca.pem /etc/docker/certs/server-cert.pem
            
            # Configure Docker daemon
            echo '$DAEMON_JSON' | sudo tee /etc/docker/daemon.json > /dev/null
            
            # Create override to remove -H from ExecStart (conflicts with daemon.json hosts)
            sudo mkdir -p /etc/systemd/system/docker.service.d
            echo '[Service]
          ExecStart=
          ExecStart=/usr/bin/dockerd' | sudo tee /etc/systemd/system/docker.service.d/override.conf > /dev/null
            
            # Restart Docker
            sudo systemctl daemon-reload
            sudo systemctl restart docker
            sudo rm -rf /tmp/certs
            
            # Wait for Docker to be ready
            sleep 5
            
            # Verify Docker is running
            docker ps || exit 1
            echo '✅ Docker TLS configured successfully'
          "

      - name: Verify Docker TLS configuration
        if: steps.tls_rotation.outputs.rotate == 'true'
        run: |
          EC2_IP="${{ steps.get_ip.outputs.EC2_IP }}"
          ssh -i ~/.ssh/id_rsa ubuntu@$EC2_IP << 'EOF'
            set -e
            echo "Verifying Docker TLS configuration..."
            
            # Check certificates exist
            if [ ! -f /etc/docker/certs/ca.pem ] || \
               [ ! -f /etc/docker/certs/server-cert.pem ] || \
               [ ! -f /etc/docker/certs/server-key.pem ]; then
              echo "::error::Missing TLS certificates in /etc/docker/certs/"
              exit 1
            fi
            
            # Check certificate permissions
            if [ "$(stat -c %a /etc/docker/certs/server-key.pem)" != "600" ]; then
              echo "::error::Server key permissions incorrect (should be 600)"
              exit 1
            fi
            
            # Check daemon.json configuration
            if ! grep -q '"tls": true' /etc/docker/daemon.json; then
              echo "::error::Docker daemon.json missing TLS configuration"
              exit 1
            fi
            
            # Check Docker is listening on port 2376
            if ! sudo netstat -tlnp 2>/dev/null | grep -q ':2376' && \
               ! sudo ss -tlnp 2>/dev/null | grep -q ':2376'; then
              echo "::warning::Docker may not be listening on port 2376"
              echo "Checking Docker service status..."
              sudo systemctl status docker --no-pager || true
            fi
            
            # Verify Docker is running
            if ! docker ps > /dev/null 2>&1; then
              echo "::error::Docker is not responding"
              exit 1
            fi
            
            echo "✅ All TLS certificates present"
            echo "✅ Certificate permissions correct"
            echo "✅ Docker daemon.json configured for TLS"
            echo "✅ Docker service is running"
            echo ""
            echo "Docker TLS configuration verified successfully!"
          EOF

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          echo "$HOME/.railway/bin" >> $GITHUB_PATH

      - name: Configure Railway API Service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          EC2_IP="${{ steps.get_ip.outputs.EC2_IP }}"

          # Build Railway reference variable syntax by concatenating to avoid GitHub Actions parsing
          DOLLAR='$'
          OPEN='{{'
          CLOSE='}}'
          REDIS_REF="${DOLLAR}${OPEN}Redis.REDIS_URL${CLOSE}"
          railway variables \
            --service @mike-os-x/api \
            --set "ENVIRONMENT=production" \
            --set "DOCKER_HOST=tcp://$EC2_IP:2376" \
            --set "DOCKER_TLS_VERIFY=1" \
            --set "REDIS_URL=$REDIS_REF" \
            --set "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" \
            --set "ADMIN_API_KEY=${{ secrets.ADMIN_API_KEY }}"

          echo "✅ Railway API service configured"

      - name: Configure Railway API TLS Credentials
        if: steps.tls_rotation.outputs.rotate == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          DOCKER_CA_CERT=$(base64 < certs/client/ca.pem | tr -d '\n')
          DOCKER_CLIENT_CERT=$(base64 < certs/client/cert.pem | tr -d '\n')
          DOCKER_CLIENT_KEY=$(base64 < certs/client/key.pem | tr -d '\n')

          railway variables \
            --service @mike-os-x/api \
            --set "DOCKER_CA_CERT=$DOCKER_CA_CERT" \
            --set "DOCKER_CLIENT_CERT=$DOCKER_CLIENT_CERT" \
            --set "DOCKER_CLIENT_KEY=$DOCKER_CLIENT_KEY"

          echo "✅ Railway API TLS credentials configured"

      - name: Remove generated client credentials
        if: always()
        run: rm -rf certs

      - name: Configure Railway Web Service
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          # Configure web service with API URL
          railway variables \
            --service @mike-os-x/web \
            --set "VITE_API_URL=https://api.os.mikemoschitto.com"

          echo "✅ Railway web service configured"

      - name: Clone repository on EC2
        run: |
          EC2_IP="${{ steps.get_ip.outputs.EC2_IP }}"
          ssh -i ~/.ssh/id_rsa ubuntu@$EC2_IP << 'EOF'
            set -e
            if [ ! -d ~/mike-os-x/.git ]; then
              echo "Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git ~/mike-os-x
            else
              echo "Repository already exists, updating..."
              cd ~/mike-os-x
              git fetch origin main
              git checkout main
              git pull origin main
            fi
            echo "✅ Repository ready"
          EOF

      - name: Deploy Terminal Container
        run: |
          EC2_IP="${{ steps.get_ip.outputs.EC2_IP }}"
          ssh -i ~/.ssh/id_rsa ubuntu@$EC2_IP << 'EOF'
            set -e
            cd ~/mike-os-x/apps/api
            
            echo "Building terminal container..."
            docker-compose -f docker-compose.terminal.yml build terminal
            
            echo "Starting terminal container..."
            docker-compose -f docker-compose.terminal.yml up -d terminal
            
            sleep 3
            
            # Verify container is running
            if docker ps | grep -q terminal-shared; then
              echo "✅ Terminal container deployed and running"
              docker exec terminal-shared echo "Terminal container healthy"
            else
              echo "::error::Terminal container failed to start"
              docker logs terminal-shared || true
              exit 1
            fi
          EOF

      - name: Remove deployment SSH key
        if: always()
        run: rm -f ~/.ssh/id_rsa

      - name: Summary
        env:
          TLS_ROTATED: ${{ steps.tls_rotation.outputs.rotate }}
        run: |
          EC2_IP="${{ steps.get_ip.outputs.EC2_IP }}"
          echo "## Infrastructure Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**EC2 IP:** \`$EC2_IP\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Host:** \`tcp://$EC2_IP:2376\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$TLS_ROTATED" = "true" ]; then
            echo "✅ TLS certificates rotated and installed" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Existing TLS certificates remain current" >> $GITHUB_STEP_SUMMARY
          fi
          echo "✅ Docker daemon configured for TLS" >> $GITHUB_STEP_SUMMARY
          echo "✅ Docker service running and accessible" >> $GITHUB_STEP_SUMMARY
          echo "✅ Terminal container deployed and healthy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Railway Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Railway automatically configured:" >> $GITHUB_STEP_SUMMARY
          echo "  - API: Docker TLS, Redis, CORS, Auth, Production environment" >> $GITHUB_STEP_SUMMARY
          echo "  - Web: API URL configured" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Services will auto-deploy with new configuration." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ready to Use" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Infrastructure is fully deployed. Terminal should be accessible at https://os.mikemoschitto.com" >> $GITHUB_STEP_SUMMARY
