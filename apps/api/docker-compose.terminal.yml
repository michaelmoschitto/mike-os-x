version: '3.8'

services:
  terminal:
    build:
      context: .
      dockerfile: terminal.Dockerfile
    container_name: terminal-shared
    hostname: mikeos
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    network_mode: none
    user: '1000:1000'
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 128
    tmpfs:
      - /tmp:size=256m
      - /var/tmp:size=256m
      - /workspace:size=64m,uid=1000,gid=1000,mode=0755
    restart: unless-stopped
    command: tail -f /dev/null
